<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; }
  h2 { margin: 0 0 12px; font-size: 15px; }
  label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; }
  input[type="text"], input[type="password"] { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
  .toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .toggle input { width: auto; margin: 0; }
  button { width: 100%; padding: 7px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-bottom: 6px; }
  .btn-save { background: #2563eb; color: #fff; }
  .btn-save:hover { background: #1d4ed8; }
  .btn-dash { background: #f3f4f6; color: #333; }
  .btn-dash:hover { background: #e5e7eb; }
  .status { font-size: 12px; color: #16a34a; text-align: center; display: none; }
</style>
</head>
<body>
  <h2>Email Tracker Settings</h2>
  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://your-app.fly.dev">
  <label>Password</label>
  <input type="password" id="password" placeholder="Dashboard password">
  <div class="toggle">
    <input type="checkbox" id="enabled">
    <label for="enabled" style="margin:0">Enable tracking</label>
  </div>
  <button class="btn-save" id="saveBtn">Save</button>
  <button class="btn-dash" id="dashBtn">Open Dashboard</button>
  <div class="status" id="status">Settings saved!</div>
  <script src="popup.js"></script>
</body>
</html>
