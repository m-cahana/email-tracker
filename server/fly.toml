# fly.toml app configuration file generated for email-open-tracker on 2026-03-14T13:52:56-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'email-open-tracker'
primary_region = 'ord'

[build]

[[mounts]]
  source = 'tracker_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
